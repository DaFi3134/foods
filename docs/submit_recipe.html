<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Добавить рецепт — Correctly Foods</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <main class="page">
    <section class="card">
      <h1>Добавить рецепт</h1>
      <p>
        Заполните форму. Рецепт попадёт на модерацию и появится на сайте
        только после проверки.
      </p>

      <form
        class="recipe-form"
        action="https://formspree.io/f/xrejedrd"
        method="POST"
      >
        <label>
          Название рецепта
          <input type="text" name="Название рецепта" required>
        </label>

        <label>
          Ваше имя или ник
          <input type="text" name="Автор" required>
        </label>

        <label>
          Категория
          <select name="Категория" required>
            <option value="">Выберите категорию</option>
            <option value="Завтрак">Завтрак</option>
            <option value="Обед">Обед</option>
            <option value="Ужин">Ужин</option>
            <option value="Салат">Салат</option>
            <option value="Десерт">Десерт</option>
            <option value="Перекус">Перекус</option>
          </select>
        </label>

        <label>
          Время приготовления, минут
          <input type="number" name="Время приготовления" min="1">
        </label>

        <label>
          Калорийность, если знаете
          <input type="text" name="Калорийность" placeholder="Например: 350 ккал">
        </label>

        <label>
          Ингредиенты
          <textarea
            name="Ингредиенты"
            rows="7"
            required
            placeholder="Каждый ингредиент с новой строки"
          ></textarea>
        </label>

        <label>
          Шаги приготовления
          <textarea
            name="Шаги приготовления"
            rows="8"
            required
            placeholder="Опишите приготовление по шагам"
          ></textarea>
        </label>

        <label>
          Комментарий для модератора
          <textarea
            name="Комментарий"
            rows="4"
            placeholder="Например: источник рецепта, пожелания, уточнения"
          ></textarea>
        </label>

        <label>
          Контакт для связи, необязательно
          <input
            type="text"
            name="Контакт"
            placeholder="Telegram, email или другое"
          >
        </label>

        <button type="submit">Отправить на модерацию</button>
      </form>
    </section>
  </main>

  <script src="js/layout.js"></script>
</body>
</html>
