{% extends "base.html" %}
{% block content %}
<h4>Добавить блюдо</h4>
<form method="post" enctype="multipart/form-data" id="dishForm">
  <div class="mb-2"><label>Название</label><input name="name" class="form-control"></div>
  <div class="mb-2"><label>Типы приёмов (через запятую, напр. breakfast,lunch)</label><input name="meal_types" class="form-control"></div>
  <div class="mb-2"><label>Фотография (опционально)</label><input type="file" name="photo" class="form-control"></div>

  <div class="mb-2">
    <label>Ингредиенты</label>
    <div id="ings">
      <!-- rows inserted here -->
    </div>
    <div class="d-flex gap-2 mt-2">
      <input id="ingName" class="form-control" placeholder="Название продукта">
      <input id="ingGrams" class="form-control" placeholder="Граммы" style="max-width:140px">
      <button id="addIng" type="button" class="btn btn-outline-primary">Добавить</button>
    </div>
  </div>

  <div class="mb-2">
    <label>Инструкция</label>
    <textarea name="instructions" class="form-control" rows="3"></textarea>
  </div>

  <input type="hidden" name="ingredients_raw" id="ingredients_raw">
  <button class="btn btn-primary">Сохранить блюдо</button>
</form>

<script>
const ings = [];
function renderIngs(){
  const container = document.getElementById('ings'); container.innerHTML='';
  ings.forEach((it,idx)=>{
    const el = document.createElement('div'); el.className='badge bg-light border d-inline-flex align-items-center me-1 mb-1';
    el.innerHTML = `${it.product} — ${it.grams} г <button data-i="${idx}" class="btn-close btn-close-sm ms-2 remove-ing" aria-label="x"></button>`;
    container.appendChild(el);
  });
  document.getElementById('ingredients_raw').value = JSON.stringify(ings);
}
document.getElementById('addIng').addEventListener('click', ()=>{
  const name = document.getElementById('ingName').value.trim();
  const grams = parseFloat(document.getElementById('ingGrams').value);
  if(!name || !grams) return;
  ings.push({product:name, grams:grams});
  document.getElementById('ingName').value=''; document.getElementById('ingGrams').value='';
  renderIngs();
});
document.addEventListener('click',(e)=>{
  if(e.target.classList.contains('remove-ing')){
    const i = parseInt(e.target.dataset.i); ings.splice(i,1); renderIngs();
  }
});
</script>
{% endblock %}
