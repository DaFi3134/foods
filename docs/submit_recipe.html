<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Добавить рецепт</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="site-header"></header>
<main class="py-4"><div class="container">

<h1 class="page-title mb-3">Добавить рецепт на модерацию</h1>
<div class="alert alert-warning">Перед публикацией замени в <code>js/core.js</code> значение <code>GITHUB_REPO_URL</code> на ссылку своего репозитория.</div>
<div class="form-section">
  <form id="submissionForm" data-type="dish">
    <div class="mb-3"><label class="form-label">Название рецепта</label><input name="title" class="form-control" required></div>
    <div class="mb-3"><label class="form-label">Автор</label><input name="author" class="form-control"></div>
    <div class="mb-3"><label class="form-label">Типы приёма пищи</label><input name="meal_types" class="form-control" placeholder="breakfast, lunch, dinner"></div>
    <div class="mb-3"><label class="form-label">Ингредиенты</label><textarea name="ingredients" class="form-control" rows="5" placeholder="Овсянка — 50 г\nБанан — 100 г"></textarea></div>
    <div class="mb-3"><label class="form-label">Приготовление</label><textarea name="instructions" class="form-control" rows="5"></textarea></div>
    <div class="mb-3"><label class="form-label">Ссылка на изображение</label><input name="image" class="form-control"></div>
    <button class="btn btn-primary">Открыть заявку в GitHub</button>
    <a id="issueLink" class="btn btn-outline-secondary ms-2" target="_blank" rel="noopener">Ссылка на заявку</a>
  </form>
</div>
</div></main>
<footer id="site-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/core.js"></script>
<script src="js/layout.js"></script>
<script src="js/submit.js"></script>
</body>
</html>
