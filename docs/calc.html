<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Калькулятор</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="site-header"></header>
<main class="py-4"><div class="container">

<h1 class="page-title mb-3">Расчёт калорий и БЖУ</h1>
<div class="form-section mb-4">
  <form id="calcForm" class="row g-3">
    <div class="col-md-2"><label class="form-label">Пол</label><select name="sex" class="form-select"><option value="male">Мужской</option><option value="female">Женский</option></select></div>
    <div class="col-md-2"><label class="form-label">Возраст</label><input name="age" type="number" class="form-control" value="25"></div>
    <div class="col-md-2"><label class="form-label">Вес, кг</label><input name="weight" type="number" class="form-control" value="70"></div>
    <div class="col-md-2"><label class="form-label">Рост, см</label><input name="height" type="number" class="form-control" value="175"></div>
    <div class="col-md-3"><label class="form-label">Активность</label><select name="activity" class="form-select"><option value="sedentary">Малоподвижный</option><option value="light">Лёгкая</option><option value="moderate">Средняя</option><option value="active">Активный</option><option value="very">Очень активный</option></select></div>
    <div class="col-12 d-flex gap-2"><button class="btn btn-primary">Рассчитать</button><button type="button" id="fillFromProfile" class="btn btn-outline-success">Заполнить из профиля</button></div>
  </form>
</div>
<div id="calcResult"></div>
</div></main>
<footer id="site-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/core.js"></script>
<script src="js/layout.js"></script>
<script src="js/calc.js"></script>
</body>
</html>
