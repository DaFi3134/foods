<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мифы и факты</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Мифы и факты</h1>
  </header>

  <main id="myths-container"></main>

  <script>
    // Загружаем мифы из файла JSON
    fetch('data/myths.json')
      .then(response => response.json())
      .then(myths => {
        const container = document.getElementById('myths-container');
        myths.forEach(myth => {
          const mythElement = document.createElement('div');
          mythElement.classList.add('myth');

          mythElement.innerHTML = `
            <h2>${myth.title}</h2>
            <p><em>${myth.author} — ${myth.date}</em></p>
            <img src="${myth.image}" alt="${myth.title}" />
            <p><strong>Краткое описание:</strong> ${myth.short_summary}</p>
            <p><strong>Полный текст:</strong> ${myth.full_text}</p>
            <p><strong>Формат:</strong> ${myth.format}</p>
            <p><strong>Категория:</strong> ${myth.category}</p>
            <h3>Источники:</h3>
            <ul>
              ${myth.sources.map(source => `<li>${source}</li>`).join('')}
            </ul>
            <h3>Доказательства:</h3>
            <ul>
              ${myth.proofs.map(proof => `<li>${proof}</li>`).join('')}
            </ul>
          `;
          
          container.appendChild(mythElement);
        });
      })
      .catch(error => console.error('Ошибка при загрузке мифов:', error));
  </script>
</body>
</html>
