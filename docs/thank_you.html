<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Заявка отправлена — healthy food</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="site-header"></header>

<main class="py-5">
  <div class="container">
    <section class="thank-you-card soft-shadow mx-auto">
      <div class="thank-you-icon"><i class="bi bi-check2-circle"></i></div>
      <h1>Заявка отправлена</h1>
      <p id="thanksText">Спасибо! Материал ушёл на модерацию.</p>
      <div class="d-flex flex-wrap justify-content-center gap-2 mt-3">
        <a class="btn btn-primary" href="index.html">На главную</a>
      </div>
    </section>
  </div>
</main>

<footer id="site-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/core.js"></script>
<script src="js/layout.js"></script>
<script>
  const type = new URLSearchParams(window.location.search).get("type");
  if (type) {
    document.getElementById("thanksText").textContent = `${type} сохранён и ждёт модерации. После одобрения материал появится на сайте.`;
  }
</script>
</body>
</html>
