<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Планировщик</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="site-header"></header>
<main class="py-4"><div class="container">

<h1 class="page-title mb-3">Планировщик питания</h1>
<div class="form-section mb-4">
  <form id="plannerForm" class="row g-3">
    <div class="col-md-4"><label class="form-label">Калории на день</label><input id="calories" type="number" class="form-control" value="2000"></div>
    <div class="col-md-4"><label class="form-label">Количество приёмов</label><select id="meals" class="form-select"><option value="4">4 приёма</option><option value="3">3 приёма</option><option value="5">5 приёмов</option></select></div>
    <div class="col-md-4 d-flex align-items-end"><button class="btn btn-primary w-100">Составить план</button></div>
  </form>
</div>
<div id="planOutput" class="mb-4"></div>
<div class="alert alert-info">Планировщик учитывает пожелания и аллергии из профиля, если они сохранены в этом браузере.</div>
</div></main>
<footer id="site-footer"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/core.js"></script>
<script src="js/layout.js"></script>
<script src="js/planner.js"></script>
</body>
</html>
