{% extends "base.html" %}
{% block content %}
<h3>Мифы и факты</h3>
<div class="row g-4">
  {% for article in articles %}
  <div class="col-md-4 d-flex">
    <div class="card flex-fill">
      {% if article.img %}
      <img src="{{ url_for('static', filename='img/' ~ article.img) }}" class="card-img-top">
      {% endif %}
      <div class="card-body d-flex flex-column">
        <h5>{{ article.title }}</h5>
        <p class="small text-muted">Автор: {{ article.author_name or 'Редакция' }}</p>
        <p>{{ article.content[:120] }}...</p>
        <a href="{{ url_for('myth_detail', article_id=article.id) }}" class="mt-auto btn btn-outline-primary">Читать</a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
<a href="{{ url_for('add_myth') }}" class="btn btn-success mt-4">Добавить свою статью</a>
{% endblock %}
